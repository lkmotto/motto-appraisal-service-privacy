name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: HTML validation
        run: npx html-validate "**/*.html" || true

      - name: Lint
        run: npx prettier --check "**/*.{html,css,js}" || true
